version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 6
    groups:
      non-major-dependencies:
        patterns: ["*"]
        update-types: [minor, patch]
    labels: [dependencies]
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    groups:
      non-major-actions:
        patterns: ["*"]
        update-types: [minor, patch]
    labels: [dependencies, ci]
    commit-message:
      prefix: ci

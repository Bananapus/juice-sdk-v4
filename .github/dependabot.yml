version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: thursday
      time: "09:00"
      timezone: America/Sao_Paulo
    # SDK dependency upgrades are coordinated with release testing. Disable
    # routine version PRs while keeping grouped security updates enabled.
    open-pull-requests-limit: 0
    ignore:
      # These npm aliases, Git dependencies, and workspace paths are not
      # registry package names; their real parent dependencies remain eligible.
      - dependency-name: "@openzeppelin/contracts-4.7.3"
      - dependency-name: "@openzeppelin/contracts-4.8.3"
      - dependency-name: "@openzeppelin/contracts-4.9.6"
      - dependency-name: "@openzeppelin/contracts-5.0.2"
      - dependency-name: "@openzeppelin/contracts-5.1.0"
      - dependency-name: "@uniswap/permit2"
      - dependency-name: "@zksync/contracts"
      - dependency-name: cbw-sdk
      - dependency-name: packages/core
      - dependency-name: packages/react
      - dependency-name: packages/revnet
      - dependency-name: packages/wagmi-config
    groups:
      security:
        applies-to: security-updates
        patterns: ["*"]
    labels: [dependencies]
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: thursday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    allow:
      - dependency-type: all
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    groups:
      routine:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]
      security:
        applies-to: security-updates
        patterns: ["*"]
    labels: [dependencies, ci]
    commit-message:
      prefix: ci

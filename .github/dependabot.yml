version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: thursday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
      semver-minor-days: 14
      semver-patch-days: 7
    versioning-strategy: lockfile-only
    allow:
      - dependency-type: all
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    # These updates need coordinated compiler/runtime migrations. Keep the
    # validated lock lines until those migrations carry their own fixtures.
    ignore:
      - dependency-name: prettier
        versions: [">=3.9.0 <4"]
      - dependency-name: typescript
        versions: [">=5.9.3 <6"]
      - dependency-name: viem
        versions: [">=2.55.0 <3"]
      - dependency-name: wagmi
        versions: [">=2.19.0 <3"]
    groups:
      routine:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]
      security:
        applies-to: security-updates
        patterns: ["*"]
    labels: [dependencies]
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: thursday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    allow:
      - dependency-type: all
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    groups:
      routine:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]
      security:
        applies-to: security-updates
        patterns: ["*"]
    labels: [dependencies, ci]
    commit-message:
      prefix: ci

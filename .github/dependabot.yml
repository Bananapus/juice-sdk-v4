version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: thursday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
      semver-minor-days: 14
      semver-patch-days: 7
    versioning-strategy: lockfile-only
    allow:
      - dependency-type: all
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    # These updates need coordinated compiler/runtime migrations. Keep the
    # validated lock lines until those migrations carry their own fixtures.
    ignore:
      - dependency-name: prettier
        versions: [">=3.9.0 <4"]
      - dependency-name: typescript
        versions: [">=5.9.3 <6"]
      - dependency-name: viem
        versions: [">=2.55.0 <3"]
      - dependency-name: wagmi
        versions: [">=2.18.0 <3"]
      # These npm aliases, Git dependencies, and workspace paths are not
      # registry package names; their real parent dependencies remain eligible.
      - dependency-name: "@openzeppelin/contracts-4.7.3"
      - dependency-name: "@openzeppelin/contracts-4.8.3"
      - dependency-name: "@openzeppelin/contracts-4.9.6"
      - dependency-name: "@openzeppelin/contracts-5.0.2"
      - dependency-name: "@openzeppelin/contracts-5.1.0"
      - dependency-name: "@uniswap/permit2"
      - dependency-name: "@zksync/contracts"
      - dependency-name: cbw-sdk
      - dependency-name: packages/core
      - dependency-name: packages/react
      - dependency-name: packages/revnet
      - dependency-name: packages/wagmi-config
    groups:
      routine:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]
      security:
        applies-to: security-updates
        patterns: ["*"]
    labels: [dependencies]
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: thursday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    allow:
      - dependency-type: all
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    groups:
      routine:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]
      security:
        applies-to: security-updates
        patterns: ["*"]
    labels: [dependencies, ci]
    commit-message:
      prefix: ci
